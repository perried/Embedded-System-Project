services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-telcoguard}
      POSTGRES_USER: ${DB_USER:-telcoguard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "telcoguard"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── TelcoGuard Hub (Express + Socket.IO) ──
  hub:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-telcoguard}
      DB_USER: ${DB_USER:-telcoguard}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}

volumes:
  pg_data:
